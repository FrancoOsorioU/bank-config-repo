server:
  port: 8083

spring:
  application:
    name: credit-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/credit-db
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: credit-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 5
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.interval.ms: 600000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        request.timeout.ms: 60000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        acks: all
        retries: 3
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
  timelimiter:
    instances:
      default:
        timeout-duration: 2s

kafka:
  topics:
    credit-card-check-request: credit-card-check-request
    credit-card-check-response: credit-card-check-response
    debt-check-request: debt-check-request
    debt-check-response: debt-check-response
    third-party-payment-request: third-party-payment-request
    third-party-payment-response: third-party-payment-response
    customer-validation-request: customer-validation-request
    customer-validation-response: customer-validation-response
    account-transaction-deposit-request: account-transaction-deposit-request
    third-party-payment-request: third-party-payment-request
    third-party-payment-response: third-party-payment-response
    credit-card-check-response: credit-card-check-response
    customer-validation-request: customer-validation-request
