server:
  port: 8085

spring:
  application:
    name: yanki-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/yanki-db
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 5
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.interval.ms: 600000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        request.timeout.ms: 60000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        acks: all
        retries: 3
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2

  timelimiter:
    instances:
      default:
        timeout-duration: 2s

kafka:
  topics:
    yanki-link-debit-card-request: yanki-link-debit-card-request
    yanki-link-debit-card-response: yanki-link-debit-card-response
    yanki-payment-completed: yanki-payment-completed
    linked-debit-card-operation-request: linked-debit-card-operation-request
    linked-debit-card-operation-response: linked-debit-card-operation-response
