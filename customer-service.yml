server:
  port: 8081

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/customers-db
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: customer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 5             # evalúa las últimas 5 llamadas
        failure-rate-threshold: 50         # si 50% fallan → abre el circuito
        wait-duration-in-open-state: 10s   # espera 10s antes de pasar a HALF-OPEN
        permitted-number-of-calls-in-half-open-state: 2

  timelimiter:
    instances:
      default:
        timeout-duration: 2s               # ← requisito del proyecto: 2 segundos 
kafka:
  topics:
    customer-validation-request: customer-validation-request
    customer-validation-response: customer-validation-response
